<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fichaje">
  <title>Fichaje · VUDU</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --border-light: rgba(255,255,255,0.15);
      --accent: #ffffff;
      --accent-dim: rgba(255,255,255,0.6);
      --accent-faint: rgba(255,255,255,0.08);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.3);
      --green: #7ecfa0;
      --noct: #7eb5cf;
      --red: #cf7e7e;
      --text: #f0f0f0;
      --muted: #666666;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.6;
    }

    .app {
      width: 100%; max-width: 480px; min-height: 100dvh;
      display: flex; flex-direction: column;
      position: relative; z-index: 1;
      padding: 0 18px 60px;
    }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .header-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 36px; height: 36px;
    }
    .logo-wordmark {
      display: flex; flex-direction: column; gap: 1px;
    }
    .logo-vudu {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--text);
      line-height: 1;
    }
    .logo-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 300;
    }
    .header-time {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* SCREENS */
    .screen { display: none; flex-direction: column; gap: 20px; padding-top: 32px; animation: fadeUp 0.4s ease; }
    .screen.active { display: flex; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ─── PIN SCREEN ─── */
    .pin-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px; letter-spacing: 4px; color: var(--muted);
      text-transform: uppercase; font-weight: 300;
    }
    .pin-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 900; line-height: 1.1;
      color: var(--text);
    }
    .pin-title em { font-style: italic; color: var(--gold); }

    .pin-display {
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
    .pin-display::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.5), transparent);
    }
    .pin-dots {
      font-family: 'Space Mono', monospace;
      font-size: 28px; letter-spacing: 14px;
      color: var(--gold); min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .pin-label {
      font-size: 9px; letter-spacing: 3px; color: var(--muted);
      text-transform: uppercase; margin-top: 10px; font-family: 'Cormorant Garamond', serif;
    }

    .numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .numpad-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
      height: 66px; cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .numpad-btn:active { transform: scale(0.9); background: var(--surface2); border-color: var(--border-light); }
    .numpad-btn.del { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--muted); }
    .numpad-btn.ok {
      background: var(--gold); border-color: var(--gold);
      color: #0a0a0a; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      font-family: 'Cormorant Garamond', serif; font-weight: 500;
    }
    .numpad-btn.ok:active { background: #b8944d; }

    /* ─── PANTALLA PRINCIPAL (MENU) ─── */
    .menu-screen {
      display: flex; flex-direction: column; gap: 16px; flex: 1;
    }

    .menu-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.2s;
      position: relative; overflow: hidden;
      text-align: center;
    }

    .menu-item::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.4), transparent);
    }

    .menu-item:active {
      background: var(--surface2);
      border-color: var(--gold);
    }

    .menu-icon {
      font-size: 32px; margin-bottom: 12px;
    }

    .menu-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px;
    }

    .menu-desc {
      font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    }

    /* ─── PERFIL HEADER ─── */
    .profile-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 24px;
    }

    .profile-info {
      flex: 1;
    }

    .profile-eyebrow {
      font-size: 9px; letter-spacing: 3px; color: var(--gold);
      text-transform: uppercase; font-weight: 300;
      font-family: 'Cormorant Garamond', serif;
    }
    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700; margin-top: 2px; line-height: 1.2;
    }

    .btn-logout {
      background: var(--red); border: 1px solid var(--red);
      color: #fff; border-radius: var(--radius); padding: 10px 16px;
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-logout:active { background: #b86767; border-color: #b86767; }

    /* ─── FORMULARIO ─── */
    .fecha-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--surface);
      position: relative; overflow: hidden;
      margin-bottom: 20px;
    }
    .fecha-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.4), transparent);
    }

    .fecha-display {
      text-align: center;
      margin-bottom: 4px;
    }

    .fecha-dia {
      font-size: 9px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; font-family: 'Cormorant Garamond', serif;
    }

    .fecha-numero {
      font-family: 'Playfair Display', serif;
      font-size: 42px; font-weight: 900; color: var(--gold);
      line-height: 1;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block; font-size: 10px; letter-spacing: 2px;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 8px; font-family: 'Cormorant Garamond', serif; font-weight: 300;
    }

    .input-group input {
      width: 100%; padding: 12px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 16px; text-align: center;
    }

    .input-group input:focus {
      outline: none; border-color: var(--gold); background: var(--bg);
    }

    .btn-guardar {
      width: 100%; background: var(--gold); border: 1px solid var(--gold);
      color: #0a0a0a; border-radius: var(--radius); padding: 12px;
      font-family: 'Cormorant Garamond', serif; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }

    .btn-guardar:active { background: #b8944d; }
    .btn-guardar.guardando { opacity: 0.6; pointer-events: none; }

    .btn-volver {
      width: 100%; background: transparent; border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius); padding: 10px;
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 300;
      cursor: pointer; transition: all 0.15s; margin-top: 8px;
    }

    .btn-volver:active { background: var(--surface); }

    /* LOADING & TOAST */
    .loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 998; }
    .loading.show { display: flex; }
    .spinner { border: 3px solid var(--border); border-top-color: var(--gold); width: 40px; height: 40px; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(200px);
      background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px;
      border-radius: var(--radius); color: var(--text); font-size: 12px;
      transition: all 0.3s; z-index: 997;
      letter-spacing: 1px; font-family: 'Cormorant Garamond', serif;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-brand">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
        <path d="M12 2v10m0 0l-6-6m6 6l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-wordmark">
        <div class="logo-vudu">VUDU</div>
        <div class="logo-sub">Fichaje</div>
      </div>
    </div>
    <div class="header-time" id="headerTime">00:00:00</div>
  </div>

  <!-- SCREEN PIN -->
  <div class="screen active" id="screenPin">
    <div class="pin-eyebrow">Bienvenido</div>
    <div class="pin-title">Ingresa tu <em>PIN</em></div>

    <div class="pin-display">
      <div class="pin-dots" id="pinDots">_ _ _</div>
      <div class="pin-label">4 dígitos</div>
    </div>

    <div class="numpad">
      <button class="numpad-btn" onclick="pinAdd('1')">1</button>
      <button class="numpad-btn" onclick="pinAdd('2')">2</button>
      <button class="numpad-btn" onclick="pinAdd('3')">3</button>
      <button class="numpad-btn" onclick="pinAdd('4')">4</button>
      <button class="numpad-btn" onclick="pinAdd('5')">5</button>
      <button class="numpad-btn" onclick="pinAdd('6')">6</button>
      <button class="numpad-btn" onclick="pinAdd('7')">7</button>
      <button class="numpad-btn" onclick="pinAdd('8')">8</button>
      <button class="numpad-btn" onclick="pinAdd('9')">9</button>
      <button class="numpad-btn" onclick="pinAdd('0')">0</button>
      <button class="numpad-btn del" onclick="pinDel()">⌫</button>
      <button class="numpad-btn ok" onclick="pinOk()">OK</button>
    </div>
  </div>

  <!-- SCREEN MENU -->
  <div class="screen" id="screenMenu">
    <div class="profile-header">
      <div class="profile-info">
        <div class="profile-eyebrow" id="menuPin">PIN #0000</div>
        <div class="profile-name" id="menuNombre">—</div>
      </div>
      <button class="btn-logout" onclick="logout()">↻ Cambiar</button>
    </div>

    <div class="menu-screen">
      <div class="menu-item" onclick="irAFicharHoy()">
        <div class="menu-icon">📅</div>
        <div class="menu-title">Fichar hoy</div>
        <div class="menu-desc">Registra tu entrada y salida de hoy</div>
      </div>

      <div class="menu-item" onclick="irAEditarPasado()">
        <div class="menu-icon">📆</div>
        <div class="menu-title">Editar jornada</div>
        <div class="menu-desc">Añade una jornada de días anteriores</div>
      </div>
    </div>
  </div>

  <!-- SCREEN FICHAR HOY -->
  <div class="screen" id="screenFicharHoy">
    <div class="profile-header">
      <div class="profile-info">
        <div class="profile-eyebrow" id="ficharPin">PIN #0000</div>
        <div class="profile-name" id="ficharNombre">—</div>
      </div>
      <button class="btn-logout" onclick="irAlMenu()">← Atrás</button>
    </div>

    <div class="fecha-card">
      <div class="fecha-display">
        <div class="fecha-dia" id="fechaDiaHoy">Hoy</div>
        <div class="fecha-numero" id="fechaNumeroHoy">—</div>
      </div>
    </div>

    <div class="input-group">
      <label>Hora de entrada</label>
      <input type="time" id="entradaHoy" value="20:00">
    </div>

    <div class="input-group">
      <label>Hora de salida</label>
      <input type="time" id="salidaHoy" value="02:00">
    </div>

    <button class="btn-guardar" id="btnGuardarHoy" onclick="guardarFichaje('hoy')">Guardar fichaje</button>
  </div>

  <!-- SCREEN EDITAR PASADO -->
  <div class="screen" id="screenEditarPasado">
    <div class="profile-header">
      <div class="profile-info">
        <div class="profile-eyebrow" id="editPin">PIN #0000</div>
        <div class="profile-name" id="editNombre">—</div>
      </div>
      <button class="btn-logout" onclick="irAlMenu()">← Atrás</button>
    </div>

    <div class="input-group">
      <label>Selecciona fecha</label>
      <input type="date" id="fechaSeleccionada">
    </div>

    <div class="fecha-card" id="fechaCardPasado">
      <div class="fecha-display">
        <div class="fecha-dia" id="fechaDiaPasado">—</div>
        <div class="fecha-numero" id="fechaNumeroPasado">—</div>
      </div>
    </div>

    <div class="input-group">
      <label>Hora de entrada</label>
      <input type="time" id="entradaPasado" value="20:00">
    </div>

    <div class="input-group">
      <label>Hora de salida</label>
      <input type="time" id="salidaPasado" value="02:00">
    </div>

    <button class="btn-guardar" id="btnGuardarPasado" onclick="guardarFichaje('pasado')">Guardar jornada</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQurkZgzRWxwdD9kdS6VNkPRnOv78nhV8WIzIECPRlNgJT0MCbfqh49_iz-wvuOEWYxg/exec';

  let pinActual = '';
  let trabajadorActual = null;

  // Reloj
  function tick() {
    const n = new Date();
    const timeStr = [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
    document.getElementById('headerTime').textContent = timeStr;
  }
  setInterval(tick, 1000);
  tick();

  // PIN
  function pinAdd(n) { if(pinActual.length>=4)return; pinActual+=n; renderPin(); }
  function pinDel()  { pinActual=pinActual.slice(0,-1); renderPin(); }
  function renderPin() {
    document.getElementById('pinDots').textContent = pinActual==='' ? '_ _ _' : '●'.repeat(pinActual.length);
  }
  function pinOk() { if(!pinActual)return; cargarPerfil(pinActual); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function setLoading(v) { document.getElementById('loading').classList.toggle('show',v); }

  let toastT;
  function showToast(msg,type='success') {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className=`toast show ${type}`;
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000);
  }

  async function apiCall(body) {
    const url = APPS_SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(body));
    const res = await fetch(url,{redirect:'follow'});
    return res.json();
  }

  function obtenerFechaFichaje() {
    const ahora = new Date();
    const hora = ahora.getHours();
    
    if (hora >= 0 && hora < 5) {
      ahora.setDate(ahora.getDate() - 1);
    }
    
    const año = ahora.getFullYear();
    const mes = String(ahora.getMonth() + 1).padStart(2, '0');
    const día = String(ahora.getDate()).padStart(2, '0');
    
    return {
      fecha: `${año}-${mes}-${día}`,
      obj: ahora
    };
  }

  function formatearFecha(dateObj) {
    const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    return {
      dia: DIAS[dateObj.getDay()],
      numero: dateObj.getDate()
    };
  }

  function actualizarFechaDisplay() {
    const {fecha, obj} = obtenerFechaFichaje();
    const {dia, numero} = formatearFecha(obj);
    
    document.getElementById('fechaDiaHoy').textContent = dia;
    document.getElementById('fechaNumeroHoy').textContent = numero;

    const fechaStr = `${obj.getFullYear()}-${String(obj.getMonth()+1).padStart(2,'0')}-${String(obj.getDate()).padStart(2,'0')}`;
    document.getElementById('fechaSeleccionada').value = fechaStr;
  }

  async function cargarPerfil(pin) {
    setLoading(true);
    try {
      const data = await apiCall({action:'verificarPin',pin});
      if(data.error){showToast(data.error,'error');setLoading(false);return;}
      pinActual = String(pin);
      trabajadorActual=data;
      document.getElementById('menuPin').textContent=`PIN #${pin}`;
      document.getElementById('menuNombre').textContent=data.nombre;
      document.getElementById('ficharPin').textContent=`PIN #${pin}`;
      document.getElementById('ficharNombre').textContent=data.nombre;
      document.getElementById('editPin').textContent=`PIN #${pin}`;
      document.getElementById('editNombre').textContent=data.nombre;
      actualizarFechaDisplay();
      showScreen('screenMenu');
    } catch(e){showToast('Error de conexión','error');}
    setLoading(false);
  }

  function irAFicharHoy() {
    showScreen('screenFicharHoy');
  }

  function irAEditarPasado() {
    showScreen('screenEditarPasado');
    document.getElementById('fechaSeleccionada').addEventListener('change', actualizarFechaPasado);
    actualizarFechaPasado();
  }

  function actualizarFechaPasado() {
    const fechaInput = document.getElementById('fechaSeleccionada').value;
    if(!fechaInput) return;

    const dateObj = new Date(fechaInput + 'T00:00:00');
    const {dia, numero} = formatearFecha(dateObj);
    
    document.getElementById('fechaDiaPasado').textContent = dia;
    document.getElementById('fechaNumeroPasado').textContent = numero;
  }

  function irAlMenu() {
    showScreen('screenMenu');
  }

  async function guardarFichaje(tipo) {
    let entrada, salida, fecha, btn;

    if(tipo === 'hoy') {
      entrada = document.getElementById('entradaHoy').value;
      salida = document.getElementById('salidaHoy').value;
      const {fecha: f} = obtenerFechaFichaje();
      fecha = f;
      btn = document.getElementById('btnGuardarHoy');
    } else {
      entrada = document.getElementById('entradaPasado').value;
      salida = document.getElementById('salidaPasado').value;
      fecha = document.getElementById('fechaSeleccionada').value;
      btn = document.getElementById('btnGuardarPasado');
    }

    if(!entrada || !salida) {
      showToast('Completa entrada y salida','error');
      return;
    }

    if(!fecha) {
      showToast('Selecciona una fecha','error');
      return;
    }

    btn.classList.add('guardando');
    btn.textContent = '...';

    try {
      const data = await apiCall({
        action: 'guardarDia',
        pin: pinActual,
        fecha: fecha,
        entrada: entrada,
        salida: salida,
        libre: false
      });

      if(data.error) {
        showToast(data.error, 'error');
      } else {
        showToast('✓ Jornada guardada', 'success');
        setTimeout(() => {
          logout();
        }, 1500);
      }
    } catch(e) {
      showToast('Error de conexión','error');
    }

    btn.classList.remove('guardando');
    btn.textContent = tipo === 'hoy' ? 'Guardar fichaje' : 'Guardar jornada';
  }

  function logout() {
    pinActual='';
    trabajadorActual=null;
    renderPin();
    showScreen('screenPin');
  }
</script>
</body>
</html>
